name: Weather Data Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      preset_cities:
        description: "Select a city group"
        required: true
        type: choice
        default: "South Asia — Lahore, Karachi, Mumbai, Delhi, Dhaka"
        options:
          # Asia
          - "South Asia — Lahore, Karachi, Mumbai, Delhi, Dhaka"
          - "East Asia — Tokyo, Beijing, Shanghai, Seoul, Hong Kong"
          - "Southeast Asia — Bangkok, Singapore, Jakarta, Manila, Kuala Lumpur"
          - "Middle East — Dubai, Riyadh, Doha, Abu Dhabi, Tehran"
          - "Central Asia — Tashkent, Almaty, Kabul, Baku, Tbilisi"
          # Europe
          - "Western Europe — London, Paris, Berlin, Madrid, Rome"
          - "Northern Europe — Amsterdam, Brussels, Stockholm, Oslo, Copenhagen"
          - "Eastern Europe — Moscow, Warsaw, Prague, Budapest, Bucharest"
          - "Southern Europe — Athens, Lisbon, Vienna, Zurich, Barcelona"
          # Americas
          - "North America — New York, Los Angeles, Chicago, Toronto, Vancouver"
          - "Central America — Mexico City, Guadalajara, Guatemala City, San Jose, Panama City"
          - "South America — Sao Paulo, Buenos Aires, Bogota, Lima, Santiago"
          # Africa
          - "North Africa — Cairo, Casablanca, Tunis, Algiers, Tripoli"
          - "West Africa — Lagos, Accra, Dakar, Abidjan, Nairobi"
          - "Southern Africa — Johannesburg, Cape Town, Nairobi, Lusaka, Harare"
          # Oceania
          - "Oceania — Sydney, Melbourne, Brisbane, Auckland, Perth"
          # Custom
          - "Custom (use field below)"

      custom_cities:
        description: "Custom cities — only if 'Custom' selected above (space separated)"
        required: false
        default: ""

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🌤️ Run pipeline
        run: |
          PRESET="${{ github.event.inputs.preset_cities }}"
          CUSTOM="${{ github.event.inputs.custom_cities }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            # On push: use default cities from config.py
            python run.py

          elif [ "$PRESET" = "Custom (use field below)" ]; then
            if [ -z "$CUSTOM" ]; then
              echo "❌ Custom selected but no cities provided."
              exit 1
            fi
            python run.py --cities $CUSTOM

          else
            # Strip region label (everything before " — ") then split by comma
            CITIES_RAW=$(echo "$PRESET" | sed 's/^[^—]*— //')
            CITIES=$(echo "$CITIES_RAW" | tr ',' ' ' | xargs)
            python run.py --cities $CITIES
          fi

      - name: 💾 Commit data back to repo
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🌤️ Update weather data [$(date +'%Y-%m-%d %H:%M')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
